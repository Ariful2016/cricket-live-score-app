name: cricket_live_score
description: A professional cricket live score app with real-time Firebase synchronization, built with Flutter, GetX, and Cloud Firestore.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.5
  
  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0
  
  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.1.1
  lottie: ^2.4.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  glassmorphism_ui: ^1.3.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  image_picker: ^1.0.4
  
  # Charts
  fl_chart: ^0.65.0
  
  # Icons & Images
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
